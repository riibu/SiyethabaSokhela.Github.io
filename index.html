<!-- Retro Game Gate Screen Overlay -->
<div id="game-gate">
    <canvas id="gateCanvas"></canvas>
    <div id="gate-ui">
        <h1 class="pixel-text text-flash">READY PLAYER ONE</h1>
        <button id="start-btn" onclick="unlockPortfolio()">PRESS START</button>
    </div>
</div>

<script>
    const canvas = document.getElementById('gateCanvas');
    const ctx = canvas.getContext('2d');

    // Resize canvas to cover the whole screen
    function resizeCanvas() {
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
    }
    window.addEventListener('resize', resizeCanvas);
    resizeCanvas();

    // Generate low-res 8-bit style floating grid stars
    const stars = Array.from({ length: 40 }, () => ({
        x: Math.random() * canvas.width,
        y: Math.random() * canvas.height,
        size: Math.floor(Math.random() * 4) + 3, // Blocks of 3px to 6px
        speed: Math.random() * 2 + 0.5
    }));

    function animateGate() {
        // Clear background with classic arcade dark indigo tint
        ctx.fillStyle = '#090d16';
        ctx.fillRect(0, 0, canvas.width, canvas.height);

        // Render pixelated particle background
        ctx.fillStyle = '#38bdf8';
        stars.forEach(star => {
            ctx.fillRect(star.x, star.y, star.size, star.size); // Flat square pixels
            star.y += star.speed;
            if (star.y > canvas.height) {
                star.y = 0;
                star.x = Math.random() * canvas.width;
            }
        });

        requestAnimationFrame(animateGate);
    }
    animateGate();

    // Smooth unlock transition animation
    function unlockPortfolio() {
        const gate = document.getElementById('game-gate');
        gate.style.transition = 'opacity 0.6s steps(8, end), transform 0.6s ease-in';
        gate.style.opacity = '0';
        gate.style.transform = 'scale(1.1)';
        
        setTimeout(() => {
            gate.style.display = 'none';
        }, 600);
    }
</script>
