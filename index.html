<!-- Retro Game Gate Screen Overlay -->
<div id="game-gate">
    <canvas id="gateCanvas"></canvas>
</div>

<script>
    const canvas = document.getElementById('gateCanvas');
    const ctx = canvas.getContext('2d');

    function resizeCanvas() {
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
    }
    window.addEventListener('resize', resizeCanvas);
    resizeCanvas();

    // Game State Variables
    let angle = 0;
    const bullets = [];
    const particles = [];
    let startButtonDestroyed = false;
    let transitionStarted = false;
    let screenShattered = false;
    let gateOpacity = 1.0;

    // Target Button Configurations
    const btnWidth = 240;
    const btnHeight = 60;
    let btnX = (canvas.width - btnWidth) / 2;
    let btnY = (canvas.height - btnHeight) / 2 + 100;

    // Rocket Core Properties
    const rocket = { x: 0, y: 0, width: 45, height: 75, angle: 0, active: true };

    // Starfield Background Data
    const backgroundStars = Array.from({ length: 45 }, () => ({
        x: Math.random() * window.innerWidth,
        y: Math.random() * window.innerHeight,
        size: Math.floor(Math.random() * 3) + 2,
        speed: Math.random() * 0.8 + 0.2
    }));

    // Mouse Click Trigger to Shoot
    canvas.addEventListener('click', function(e) {
        if (startButtonDestroyed) return; // Disable weapon systems once destruction begins

        const rect = canvas.getBoundingClientRect();
        const mouseX = e.clientX - rect.left;
        const mouseY = e.clientY - rect.top;

        const dx = mouseX - rocket.x;
        const dy = mouseY - rocket.y;
        const distance = Math.sqrt(dx * dx + dy * dy);

        // If user clicks near the flying rocket, fire plasma bolt
        if (distance < 60) {
            btnX = (canvas.width - btnWidth) / 2; // Recalculate center dynamically
            const targetX = canvas.width / 2;
            const targetY = btnY + btnHeight / 2;
            const angleToTarget = Math.atan2(targetY - rocket.y, targetX - rocket.x);

            bullets.push({
                x: rocket.x,
                y: rocket.y,
                vx: Math.cos(angleToTarget) * 16, // Faster projectile travel speeds
                vy: Math.sin(angleToTarget) * 16,
                radius: 6
            });

            // Muzzle flash sparks
            for (let i = 0; i < 5; i++) {
                particles.push({
                    x: rocket.x,
                    y: rocket.y,
                    vx: (Math.random() - 0.5) * 5,
                    vy: (Math.random() - 0.5) * 5,
                    color: '#3cfc4c',
                    alpha: 1,
                    size: Math.random() * 3 + 2,
                    decay: 0.04
                });
            }
        }
    });

    function drawPixelRocket(ctx, x, y, rotation) {
        if (!rocket.active) return;
        ctx.save();
        ctx.translate(x, y);
        ctx.rotate(rotation + Math.PI / 2);

        // Fins
        ctx.fillStyle = '#ff6b00';
        ctx.fillRect(-15, 20, 8, 15);
        ctx.fillRect(7, 20, 8, 15);

        // Body
        ctx.fillStyle = '#38bdf8';
        ctx.fillRect(-12, -25, 24, 45);
        ctx.fillStyle = '#0284c7'; 
        ctx.fillRect(0, -25, 12, 45);

        // Nose Cone
        ctx.fillStyle = '#ef4444';
        ctx.beginPath();
        ctx.moveTo(-12, -25);
        ctx.lineTo(0, -45);
        ctx.lineTo(12, -25);
        ctx.fill();

        ctx.restore();
    }

    // Heavy Chain-Reaction Screen Explosion Sequence
    function triggerScreenShatter(centerX, centerY) {
        startButtonDestroyed = true;
        rocket.active = false; // Hide ship in the blast glare

        // 1. Primary Button Burst Particles
        for (let i = 0; i < 80; i++) {
            particles.push({
                x: centerX + (Math.random() - 0.5) * btnWidth,
                y: centerY + (Math.random() - 0.5) * btnHeight,
                vx: (Math.random() - 0.5) * 12,
                vy: (Math.random() - 0.5) * 12,
                color: Math.random() > 0.5 ? '#38bdf8' : '#ffffff',
                alpha: 1,
                size: Math.random() * 6 + 4,
                decay: 0.015
            });
        }

        // 2. Delayed Massive Screen Shatter Shockwave
        setTimeout(() => {
            screenShattered = true;
            
            // Generate thousands of velocity fragments spinning outward to break the screen matrix
            for (let i = 0; i < 250; i++) {
                const angleOffset = Math.random() * Math.PI * 2;
                const forceSpeed = Math.random() * 25 + 5; // Ultra high velocity burst speed
                particles.push({
                    x: centerX,
                    y: centerY,
                    vx: Math.cos(angleOffset) * forceSpeed,
                    vy: Math.sin(angleOffset) * forceSpeed,
                    color: Math.random() > 0.6 ? '#3cfc4c' : (Math.random() > 0.5 ? '#ff0055' : '#00ffcc'),
                    alpha: 1,
                    size: Math.random() * 8 + 3,
                    decay: 0.01
                });
            }

            // Begin final container element fade out matching the shockwave sweep
            setTimeout(fadeOutGateContainer, 200);
        }, 150);
    }

    function fadeOutGateContainer() {
        if (transitionStarted) return;
        transitionStarted = true;
        
        const gate = document.getElementById('game-gate');
        gate.style.transition = 'opacity 0.5s cubic-bezier(0.895, 0.03, 0.685, 0.22)';
        gate.style.opacity = '0';
        
        setTimeout(() => {
            gate.style.display = 'none';
        }, 500);
    }

    // Main Canvas Render Core Loop Engine
    function updateGame() {
        // Clear frame with background persistence configuration
        ctx.fillStyle = '#090d16';
        ctx.fillRect(0, 0, canvas.width, canvas.height);

        btnY = (canvas.height - btnHeight) / 2 + 100;
        const centerX = canvas.width / 2;
        const centerY = canvas.height / 2;

        // Draw Starfield Background System
        ctx.fillStyle = '#1e293b';
        backgroundStars.forEach(star => {
            ctx.fillRect(star.x, star.y, star.size, star.size);
            if (!screenShattered) {
                star.y += star.speed;
                if (star.y > canvas.height) star.y = 0;
            }
        });

        // Render UI Texts only if the screen hasn't shattered yet
        if (!screenShattered) {
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';
            
            ctx.font = '900 48px monospace';
            ctx.fillStyle = '#38bdf8';
            ctx.fillText("READY", centerX, centerY - 120);
            
            ctx.fillStyle = '#3cfc4c';
            ctx.fillText("PLAYER ONE", centerX, centerY - 60);

            // Render Press Start Box Target
            if (!startButtonDestroyed) {
                ctx.strokeStyle = '#38bdf8';
                ctx.lineWidth = 4;
                ctx.strokeRect((canvas.width - btnWidth) / 2, btnY, btnWidth, btnHeight);
                
                ctx.font = 'bold 24px monospace';
                ctx.fillStyle = '#38bdf8';
                ctx.fillText("PRESS START", centerX, btnY + (btnHeight / 2));
            }
        }

        // Handle Ship Operations & Calculations
        if (rocket.active) {
            angle += 0.015;
            rocket.x = centerX + Math.cos(angle) * (centerX * 0.6);
            rocket.y = (centerY - 40) + Math.sin(angle * 2) * 120;
            rocket.angle = angle + Math.PI / 2;

            // Engine trail logic
            if (Math.random() > 0.3) {
                particles.push({
                    x: rocket.x - Math.cos(rocket.angle) * 20,
                    y: rocket.y - Math.sin(rocket.angle) * 20,
                    vx: (Math.random() - 0.5) * 2 - Math.cos(rocket.angle) * 3,
                    vy: (Math.random() - 0.5) * 2 - Math.sin(rocket.angle) * 3,
                    color: Math.random() > 0.5 ? '#ff4500' : '#ffcc00',
                    alpha: 1,
                    size: Math.random() * 4 + 2,
                    decay: 0.06
                });
            }
            drawPixelRocket(ctx, rocket.x, rocket.y, rocket.angle);
        }

        // Manage Weapons Intersections & Movement Tracking
        for (let i = bullets.length - 1; i >= 0; i--) {
            let b = bullets[i];
            b.x += b.vx;
            b.y += b.vy;

            ctx.fillStyle = '#3cfc4c';
            ctx.fillRect(b.x - b.radius, b.y - b.radius, b.radius * 2, b.radius * 2);

            // Bounding Box Validation check
            const targetBoxX = (canvas.width - btnWidth) / 2;
            if (!startButtonDestroyed && b.x > targetBoxX && b.x < targetBoxX + btnWidth && b.y > btnY && b.y < btnY + btnHeight) {
                bullets.splice(i, 1);
                triggerScreenShatter(centerX, btnY + (btnHeight / 2));
                continue;
            }

            if (b.x < 0 || b.x > canvas.width || b.y < 0 || b.y > canvas.height) {
                bullets.splice(i, 1);
            }
        }

        // Process Particles Calculations & Global Render Stack
        for (let i = particles.length - 1; i >= 0; i--) {
            let p = particles[i];
            p.x += p.vx;
            p.y += p.vy;
            p.alpha -= p.decay;

            if (p.alpha <= 0) {
                particles.splice(i, 1);
            } else {
                ctx.fillStyle = p.color;
                ctx.globalAlpha = p.alpha;
                ctx.fillRect(p.x, p.y, p.size, p.size);
                ctx.globalAlpha = 1.0; // Reset canvas context state integrity alpha constraints
            }
        }

        requestAnimationFrame(updateGame);
    }

    updateGame();
</script>
<script>
    const canvas = document.getElementById('gateCanvas');
    const ctx = canvas.getContext('2d');

    // Resize canvas to cover the whole screen
    function resizeCanvas() {
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
    }
    window.addEventListener('resize', resizeCanvas);
    resizeCanvas();

    // Generate low-res 8-bit style floating grid stars
    const stars = Array.from({ length: 40 }, () => ({
        x: Math.random() * canvas.width,
        y: Math.random() * canvas.height,
        size: Math.floor(Math.random() * 4) + 3, // Blocks of 3px to 6px
        speed: Math.random() * 2 + 0.5
    }));

    function animateGate() {
        // Clear background with classic arcade dark indigo tint
        ctx.fillStyle = '#090d16';
        ctx.fillRect(0, 0, canvas.width, canvas.height);

        // Render pixelated particle background
        ctx.fillStyle = '#38bdf8';
        stars.forEach(star => {
            ctx.fillRect(star.x, star.y, star.size, star.size); // Flat square pixels
            star.y += star.speed;
            if (star.y > canvas.height) {
                star.y = 0;
                star.x = Math.random() * canvas.width;
            }
        });

        requestAnimationFrame(animateGate);
    }
    animateGate();

    // Smooth unlock transition animation
    function unlockPortfolio() {
        const gate = document.getElementById('game-gate');
        gate.style.transition = 'opacity 0.6s steps(8, end), transform 0.6s ease-in';
        gate.style.opacity = '0';
        gate.style.transform = 'scale(1.1)';
        
        setTimeout(() => {
            gate.style.display = 'none';
        }, 600);
    }
</script>
